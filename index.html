<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceGym — Franchise Territory Checker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #000;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header span {
      font-size: 13px;
      color: #aaa;
      font-weight: 400;
    }

    .controls {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .controls input {
      flex: 1;
      min-width: 220px;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input:focus { border-color: #000; }

    .controls button {
      padding: 10px 22px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .controls button:hover { background: #333; }
    .controls button:disabled { background: #999; cursor: not-allowed; }

    #result {
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
      min-width: 260px;
    }

    #result.inside {
      background: #e6f4ea;
      color: #1a7a35;
      border: 1px solid #a8d5b5;
      display: flex;
    }

    #result.outside {
      background: #fdecea;
      color: #b71c1c;
      border: 1px solid #f5c6c2;
      display: flex;
    }

    #result.searching {
      background: #e8f0fe;
      color: #1a56db;
      border: 1px solid #c3d4f8;
      display: flex;
    }

    #result .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #result.inside .dot  { background: #1a7a35; }
    #result.outside .dot { background: #b71c1c; }
    #result.searching .dot { background: #1a56db; }

    #map {
      flex: 1;
    }

    .legend {
      background: white;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
      font-size: 12px;
      line-height: 1.8;
    }

    .legend-title {
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      color: #555;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tip {
      font-size: 12px;
      color: #888;
      margin-left: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>FaceGym</h1>
  <span>Franchise Territory Checker</span>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Enter a town or city (e.g. Sheffield, Watford, Norwich)..." />
  <button id="searchBtn" onclick="doSearch()">Check Location</button>
  <div id="result">
    <div class="dot"></div>
    <span id="resultText"></span>
  </div>
  <span class="tip">Or click anywhere on the map</span>
</div>

<div id="map"></div>

// ── Map setup ──────────────────────────────────────────────────────────────────
const map = L.map('map').setView([54.0, -2.5], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Draw territory polygons
territories.features.forEach(feature => {
  const color = feature.properties.color;
  const latlngs = feature.geometry.coordinates[0].map(c => [c[1], c[0]]);
  L.polygon(latlngs, {
    color: color,
    weight: 2,
    opacity: 0.9,
    fillColor: color,
    fillOpacity: 0.15
  })
  .bindTooltip(feature.properties.name, { sticky: true })
  .addTo(map);
});

// Legend
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<div class="legend-title">Franchise Territories</div>';
  territories.features.forEach(f => {
    div.innerHTML += `
      <div class="legend-item">
        <div class="legend-color" style="background:${f.properties.color}; opacity:0.7;"></div>
        <span>${f.properties.name}</span>
      </div>`;
  });
  return div;
};
legend.addTo(map);

// ── Marker for searched location ───────────────────────────────────────────────
let marker = null;

function placeMarker(lat, lng, insideNames) {
  if (marker) map.removeLayer(marker);
  const color = insideNames.length > 0 ? '#1a7a35' : '#b71c1c';
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>`,
    iconAnchor: [7, 7]
  });
  marker = L.marker([lat, lng], { icon })
    .addTo(map)
    .bindPopup(insideNames.length > 0
      ? `<b>INSIDE</b><br>${insideNames.join('<br>')}`
      : '<b>OUTSIDE</b><br>Not within any franchise territory')
    .openPopup();
  map.setView([lat, lng], Math.max(map.getZoom(), 8));
}

// ── Check point against all territories ───────────────────────────────────────
function checkPoint(lat, lng) {
  const pt = turf.point([lng, lat]);
  return territories.features
    .filter(f => turf.booleanPointInPolygon(pt, f))
    .map(f => f.properties.name);
}

// ── Geocode via Nominatim ──────────────────────────────────────────────────────
async function geocode(query) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', UK')}&format=json&limit=1&countrycodes=gb`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const data = await res.json();
  if (data.length === 0) return null;
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
}

// ── Show result ────────────────────────────────────────────────────────────────
function showResult(type, text) {
  const el = document.getElementById('result');
  const textEl = document.getElementById('resultText');
  el.className = type;
  textEl.textContent = text;
}

// ── Search handler ─────────────────────────────────────────────────────────────
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  showResult('searching', 'Searching...');

  try {
    const loc = await geocode(query);
    if (!loc) {
      showResult('outside', 'Location not found. Try a more specific name.');
      btn.disabled = false;
      return;
    }

    const matches = checkPoint(loc.lat, loc.lng);
    placeMarker(loc.lat, loc.lng, matches);

    if (matches.length > 0) {
      showResult('inside', 'INSIDE: ' + matches.join(' | '));
    } else {
      showResult('outside', 'OUTSIDE — not within any franchise territory');
    }
  } catch (e) {
    showResult('outside', 'Error — check your internet connection.');
  }

  btn.disabled = false;
}

// Enter key support
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── Click on map to check ──────────────────────────────────────────────────────
map.on('click', function(e) {
  const { lat, lng } = e.latlng;
  const matches = checkPoint(lat, lng);
  placeMarker(lat, lng, matches);

  if (matches.length > 0) {
    showResult('inside', 'INSIDE: ' + matches.join(' | '));
  } else {
    showResult('outside', 'OUTSIDE — not within any franchise territory');
  }
  document.getElementById('searchInput').value = '';
});
</script>

</html>
